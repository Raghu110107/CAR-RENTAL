<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Car Rental System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-layout">
      <article class="auth-panel">
        <a class="brand" href="dashboard.html" style="margin-bottom:18px;">
          <span class="brand-mark">RR</span>
          <span>Admin Panel</span>
        </a>
        <span class="eyebrow" style="background:var(--primary-soft); color:var(--primary);">Admin panel</span>
        <h1 style="font-size:2.4rem; margin-top:14px;">Administrator login</h1>
        <p class="muted" style="margin-top:10px;">Access the back-office dashboard for fleet and booking operations.</p>

        <div class="stack" style="margin-top:24px;">
          <div class="field-group">
            <label for="adminId">Admin ID</label>
            <input class="field" id="adminId" type="text" placeholder="Enter admin username">
          </div>
          <div class="field-group">
            <label for="adminPassword">Password</label>
            <input class="field" id="adminPassword" type="password" placeholder="Enter admin password">
          </div>
          <a class="btn btn-primary" href="admin-dashboard.html">Login to Admin</a>
        </div>

        <p class="footer-note"><a href="login.html" style="color:var(--secondary); font-weight:700;">Back to customer login</a></p>
      </article>
    </section>
  </main>
</body>
</html>
