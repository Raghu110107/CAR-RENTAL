<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Requests | RoadReady Rentals</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">
  <main class="page-shell">
    <section class="admin-card">
      <div class="section-heading">
        <div>
          <h2>Quick request view</h2>
          <p>Use the full dashboard for the complete admin experience.</p>
        </div>
        <a class="btn btn-primary" href="admin-dashboard.html">Open Dashboard</a>
      </div>

      <div class="request-card">
        <div class="price-line">
          <div>
            <h3>Raghu - BMW M5</h3>
            <p class="muted">100 km premium booking request</p>
          </div>
          <span class="status-chip pending">Pending</span>
        </div>
        <div class="action-row">
          <button class="btn btn-primary" type="button">Approve</button>
          <button class="btn btn-ghost" type="button">Reject</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
